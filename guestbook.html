<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방명록 — 크리스토퍼 빈의 죽음</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="kraft-bg" aria-hidden="true"></div>

  <header class="sub-header">
    <div class="sub-header-inner">
      <h1 class="sub-title">방명록</h1>
      <a class="back-link" href="index.html">← 메인으로 돌아가기</a>
    </div>
  </header>

  <main>
    <section class="guestbook-section">

      <form id="guestbookForm" class="guestbook-form">
        <textarea id="guestbookInput" maxlength="300" placeholder="익명으로 한마디 남겨보세요 (최대 300자)"></textarea>
        <div class="guestbook-form-footer">
          <span id="guestbookStatus" class="guestbook-status"></span>
          <button type="submit" class="guestbook-submit">남기기</button>
        </div>
      </form>

      <div id="guestbookList" class="guestbook-list">
        <p class="notice-loading">불러오는 중...</p>
      </div>

    </section>
  </main>

  <!-- Supabase 클라이언트 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/guestbook-config.js"></script>
  <script src="assets/js/guestbook.js"></script>
</body>
</html>
