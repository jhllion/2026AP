<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>크리스토퍼 빈의 죽음</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============================================================
       편집 가이드
       - 극 제목/부제, D-day 날짜: 아래  표시된 곳
       - 메뉴 카드 3개는 각각 notice.html / schedule.html / guestbook.html 로 연결됨
       - 지금은 세 페이지 모두 "준비 중" 빈 페이지 상태입니다
       ============================================================ -->

  <div class="kraft-bg" aria-hidden="true"></div>

  <header class="marquee">
    <div class="marquee-inner">
      <!-- 편집: 부제 (극단 이름, 시즌 등) -->
      <p class="marquee-sub">2026 정기공연 </p>
      <!-- 편집: 극 제목 -->
      <h1 class="marquee-title">크리스토퍼 빈의 죽음</h1>
    </div>
  </header>

  <main>
    <section class="dday-section">
      <p class="dday-caption" id="ddayCaption">공연일까지</p>
      <div class="dday-badge">
        <span class="dday-label"></span>
        <span class="dday-number" id="ddayNumber">–</span>
      </div>
      <!-- 편집: 공연일은 script.js 상단의 SHOW_DATE 값을 바꾸세요 -->
    </section>

    <section class="board-section">
      <div class="board">

        <a class="note note-1" href="notice.html">
          <span class="pin" aria-hidden="true"></span>
          <span class="note-tag">01</span>
          <h2>공지</h2>
          <p>연출/스태프 전달사항, 준비물 안내</p>
        </a>

        <a class="note note-2" href="schedule.html">
          <span class="tape" aria-hidden="true"></span>
          <span class="note-tag">02</span>
          <h2>연습 일정</h2>
          <p>7월 – 11월 연습 날짜와 장소</p>
        </a>

        <a class="note note-3" href="guestbook.html">
          <span class="pin" aria-hidden="true"></span>
          <span class="note-tag">03</span>
          <h2>방명록</h2>
          <p>익명으로 한마디 남기기</p>
        </a>

      </div>
    </section>
  </main>

  <footer class="footer">
    <p>🎭 화이팅! 🎭</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
