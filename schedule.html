<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연습 일정 — 크리스토퍼 빈의 죽음</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="kraft-bg" aria-hidden="true"></div>

  <header class="sub-header">
    <div class="sub-header-inner">
      <h1 class="sub-title">연습 일정</h1>
      <a class="back-link" href="index.html">← 콜보드로 돌아가기</a>
    </div>
  </header>

  <main>
    <section class="dday-section">
      <p class="dday-caption" id="ddayCaption">공연일까지</p>
      <div class="dday-badge">
        <span class="dday-label"></span>
        <span class="dday-number" id="ddayNumber">–</span>
      </div>
    </section>

    <section class="schedule-section">
      <div id="scheduleTable" class="schedule-wrap">
        <p class="notice-loading">불러오는 중...</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="schedule-data.js"></script>
  <script src="schedule.js"></script>
</body>
</html>
